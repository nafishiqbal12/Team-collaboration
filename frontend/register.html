<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Provider Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .register-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .register-card {
        background: linear-gradient(180deg, #ffffff, #fcfbf7);
        border: 1px solid var(--line);
        border-radius: 1.5rem;
        box-shadow: 0 20px 48px rgba(20, 20, 20, 0.12);
        padding: 2rem;
        width: 100%;
        max-width: 450px;
        animation: slideUp 0.6s ease forwards;
        opacity: 0;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
        from {
          opacity: 0;
          transform: translateY(20px);
        }
      }

      .register-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .register-header h2 {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--ink);
      }

      .register-header p {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-label {
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
      }

      .form-control,
      .form-select {
        border: 1.5px solid #d9d0bd;
        background-color: #fffefa;
        border-radius: 0.65rem;
        padding: 0.65rem 0.85rem;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.15);
        background-color: #fffefa;
      }

      .form-control::placeholder {
        color: #999;
      }

      .input-group-text {
        background: #f3ecdd;
        border: 1.5px solid #d9d0bd;
        color: var(--brand);
      }

      .form-text {
        font-size: 0.8rem;
        color: #666;
        margin-top: 0.3rem;
      }

      .password-toggle {
        cursor: pointer;
        user-select: none;
        color: var(--brand);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      @media (max-width: 576px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      .btn-register {
        background: linear-gradient(135deg, var(--brand), #12867e);
        color: #fff;
        border: none;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        border-radius: 0.65rem;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 8px 18px rgba(15, 118, 110, 0.24);
      }

      .btn-register:hover {
        background: linear-gradient(135deg, var(--brand-dark), var(--brand));
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(15, 118, 110, 0.3);
      }

      .register-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.5rem 0;
        color: var(--muted);
        font-size: 0.87rem;
      }

      .register-divider::before,
      .register-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .register-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .register-footer a {
        color: var(--brand);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }

      .register-footer a:hover {
        color: var(--brand-dark);
        text-decoration: underline;
      }

      .role-badge {
        display: inline-block;
        background: rgba(15, 118, 110, 0.1);
        color: var(--brand);
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }

      .form-check {
        margin-bottom: 1rem;
      }

      .form-check-input {
        width: 1.1rem;
        height: 1.1rem;
        border: 1.5px solid #d9d0bd;
        border-radius: 0.35rem;
      }

      .form-check-input:checked {
        background-color: var(--brand);
        border-color: var(--brand);
      }

      .form-check-input:focus {
        box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.15);
        border-color: var(--brand);
      }

      .form-check-label {
        color: var(--muted);
        font-size: 0.9rem;
        margin-left: 0.5rem;
      }

      .success-icon {
        color: var(--ok);
        font-size: 0.85rem;
      }

      .error-message {
        color: var(--danger);
        font-size: 0.8rem;
        margin-top: 0.3rem;
        display: none;
      }

      .form-control.is-invalid,
      .form-select.is-invalid {
        border-color: var(--danger);
      }

      .form-control.is-invalid:focus,
      .form-select.is-invalid:focus {
        box-shadow: 0 0 0 0.2rem rgba(180, 35, 24, 0.15);
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><span class="brand-dot"></span>Provider Hub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navMain" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="providers.html">Browse Services</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Registration Form Container -->
    <div class="register-container">
      <div class="register-card">
        <!-- Header -->
        <div class="register-header">
          <h2>Create Your Account</h2>
          <p>Join Provider Hub and get started today</p>
        </div>

        <!-- Registration Form -->
        <form id="registerForm" novalidate>
          <!-- Full Name -->
          <div class="form-group">
            <label for="fullName" class="form-label">
              <i class="bi bi-person me-2"></i>Full Name
            </label>
            <input
              type="text"
              class="form-control"
              id="fullName"
              name="fullName"
              placeholder="Enter your full name"
              required
            />
            <small class="form-text text-danger error-message" id="fullNameError"></small>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-2"></i>Email Address
            </label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
            />
            <small class="form-text text-danger error-message" id="emailError"></small>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password" class="form-label">
              <i class="bi bi-lock me-2"></i>Password
            </label>
            <div class="input-group">
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Create a strong password"
                required
              />
              <span class="input-group-text password-toggle" id="passwordToggle">
                <i class="bi bi-eye"></i>
              </span>
            </div>
            <small class="form-text">Min. 8 characters, uppercase, lowercase, and number</small>
            <small class="form-text text-danger error-message" id="passwordError"></small>
          </div>

          <!-- Role Selection -->
          <div class="form-group">
            <label for="role" class="form-label">
              <i class="bi bi-briefcase me-2"></i>I want to register as
            </label>
            <select class="form-select" id="role" name="role" required>
              <option value="">Select your role</option>
              <option value="customer">Customer - Find & Book Services</option>
              <option value="provider">Service Provider - Offer Services</option>
            </select>
            <small class="form-text text-danger error-message" id="roleError"></small>
          </div>

          <!-- Location Selection -->
          <div class="form-group">
            <label for="location" class="form-label">
              <i class="bi bi-geo-alt me-2"></i>Service Location
            </label>
            <select class="form-select" id="location" name="location" required>
              <option value="">Select your location</option>
              <option value="dhanmondi">Dhanmondi</option>
              <option value="mohammadpur">Mohammadpur</option>
              <option value="both">Both Areas</option>
            </select>
            <small class="form-text text-danger error-message" id="locationError"></small>
          </div>

          <!-- Terms & Conditions -->
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              id="terms"
              name="terms"
              required
            />
            <label class="form-check-label" for="terms">
              I agree to the <a href="#" class="text-decoration-none" style="color: var(--brand);">Terms of Service</a> and <a href="#" class="text-decoration-none" style="color: var(--brand);">Privacy Policy</a>
            </label>
            <small class="form-text text-danger error-message" id="termsError"></small>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-register mt-2">
            <i class="bi bi-check-circle me-2"></i>Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="register-divider">Already registered?</div>

        <!-- Footer Link -->
        <div class="register-footer">
          <a href="login.html"><i class="bi bi-box-arrow-in-right me-1"></i>Login here</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      // Password visibility toggle
      const passwordToggle = document.getElementById('passwordToggle');
      const passwordInput = document.getElementById('password');

      passwordToggle.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordToggle.innerHTML = type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
      });

      // Form validation
      const registerForm = document.getElementById('registerForm');
      
      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Reset error messages
        document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.form-control, .form-select').forEach(el => el.classList.remove('is-invalid'));

        let isValid = true;

        // Validate Full Name
        const fullName = document.getElementById('fullName');
        if (!fullName.value.trim()) {
          showError('fullName', 'Full name is required');
          isValid = false;
        } else if (fullName.value.trim().length < 3) {
          showError('fullName', 'Name must be at least 3 characters');
          isValid = false;
        }

        // Validate Email
        const email = document.getElementById('email');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.value.trim()) {
          showError('email', 'Email is required');
          isValid = false;
        } else if (!emailRegex.test(email.value)) {
          showError('email', 'Please enter a valid email address');
          isValid = false;
        }

        // Validate Password
        const password = document.getElementById('password');
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d@$!%*?&]{8,}$/;
        if (!password.value) {
          showError('password', 'Password is required');
          isValid = false;
        } else if (!passwordRegex.test(password.value)) {
          showError('password', 'Password must have 8+ characters, uppercase, lowercase, and a number');
          isValid = false;
        }

        // Validate Role
        const role = document.getElementById('role');
        if (!role.value) {
          showError('role', 'Please select your role');
          isValid = false;
        }

        // Validate Location
        const location = document.getElementById('location');
        if (!location.value) {
          showError('location', 'Please select your location');
          isValid = false;
        }

        // Validate Terms
        const terms = document.getElementById('terms');
        if (!terms.checked) {
          showError('terms', 'You must agree to the terms');
          isValid = false;
        }

        if (isValid) {
          const formData = {
            name: fullName.value.trim(),
            email: email.value.trim(),
            password: password.value,
            role: role.value,
            location: location.value,
          };
          register(formData);
        }
      });

      function showError(fieldId, message) {
        const field = document.getElementById(fieldId);
        const errorElement = document.getElementById(fieldId + 'Error');
        field.classList.add('is-invalid');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
      }

      // Remove error styling on input
      document.querySelectorAll('.form-control, .form-select').forEach(field => {
        field.addEventListener('input', () => {
          field.classList.remove('is-invalid');
        });
      });

      document.getElementById('terms').addEventListener('change', () => {
        const field = document.getElementById('terms');
        field.classList.remove('is-invalid');
      });
    </script>
  </body>
</html>
